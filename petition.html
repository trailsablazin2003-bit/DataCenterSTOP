<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Petition</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #f4f4f4;
color: #111;
}

header {
background: #004687;
color: white;
padding: 50px 20px;
text-align: center;
}

header h1 { margin: 0; font-size: 40px; }

.navbar {
background: #003366;
text-align: center;
padding: 10px 0;
}

.nav-links {
display: flex;
justify-content: center;
}

.nav-links a {
color: white;
margin: 0 15px;
text-decoration: none;
font-weight: bold;
}

.container {
max-width: 900px;
margin: auto;
padding: 20px;
}

.section {
background: white;
padding: 20px;
border-radius: 10px;
margin-top: 20px;
}

.counter {
font-size: 42px;
font-weight: bold;
color: #004687;
text-align: center;
margin: 10px 0;
}

input {
width: 100%;
padding: 10px;
margin-top: 10px;
margin-bottom: 12px;
border-radius: 6px;
border: 1px solid #ccc;
}

button {
background: #004687;
color: white;
border: none;
padding: 12px;
width: 100%;
border-radius: 6px;
cursor: pointer;
margin-top: 10px;
}
</style>
</head>

<body>

<header>
<h1>Community Petition</h1>
<p>Help Protect Marshfield from the Proposed Data Center</p>
</header>

<div class="navbar">
<div class="nav-links">
<a href="index.html">Home</a>
<a href="petition.html">Petition</a>
<a href="contact.html">Contact</a>
</div>
</div>

<div class="container">

<div class="section">
<h3>Sign the Petition</h3>

<input type="text" id="name" placeholder="Name">
<input type="email" id="email" placeholder="Email">

<button onclick="signPetition()">Sign Petition</button>

<button onclick="shareFacebook()">Share Petition</button>
</div>

<div class="section">
<h3>Supporters Signed</h3>
<div class="counter" id="counter">249</div>
</div>

</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyDF8eCy7aveviDqjGikC6g0dFJUCkL_uQM",
authDomain: "datacenterstop-ce374.firebaseapp.com",
projectId: "datacenterstop-ce374",
storageBucket: "datacenterstop-ce374.appspot.com",
messagingSenderId: "591974235409",
appId: "1:591974235409:web:850a2c1475d26c010320b0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const baseCount = 249;
const counterEl = document.getElementById("counter");
let lastClick = 0;

/* LIVE COUNTER */
db.collection("signers").onSnapshot(snapshot => {
counterEl.innerText = baseCount + snapshot.size;
});

/* SIGN */
function signPetition() {

const now = Date.now();
if (now - lastClick < 3000) return alert("Wait a moment.");
lastClick = now;

const name = document.getElementById("name").value.trim();
const email = document.getElementById("email").value.trim().toLowerCase();

if (!name || !email) return alert("Fill out all fields.");

const ref = db.collection("signers").doc(email);

ref.get().then(doc => {
if (doc.exists) return alert("Already signed.");

ref.set({
name,
email,
timestamp: Date.now()
}).then(() => {

alert("Thank you for signing!");

document.getElementById("name").value = "";
document.getElementById("email").value = "";

confetti({
particleCount: 80,
spread: 60
});

});
});
}

/* SHARE BUTTON */
function shareFacebook() {
const text =
"Support the Marshfield petition: " + window.location.href;

navigator.clipboard.writeText(text);

alert("Copied! Paste it on Facebook.");

confetti({
particleCount: 80,
spread: 60
});
}
</script>

</body>
</html>
