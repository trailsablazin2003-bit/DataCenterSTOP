<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact Us</title>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #f4f4f4;
color: #111;
}

@media (max-width: 768px) {

/* Make header text smaller on phones */
header h1 {
font-size: 28px;
}

header p {
font-size: 14px;
padding: 0 10px;
}

/* Navbar becomes stacked */
.navbar {
text-align: left;
}

.menu-toggle {
display: block !important;
background: #003366 !important;
color: white !important;
border: none !important;
font-size: 18px !important;
cursor: pointer !important;
padding: 10px !important;
width: auto !important;
}

.nav-links {
display: none !important;
flex-direction: column;
background: #003366;
position: absolute;
width: 100%;
left: 0;
top: 100%;
z-index: 1;
}

.nav-links.show {
display: flex !important;
}

.nav-links a {
margin: 0;
padding: 10px;
border-bottom: 1px solid #004687;
}

/* Container padding tighter */
.container {
padding: 12px;
}

/* Cards feel better on small screens */
.card {
padding: 15px;
}

/* Buttons easier to tap */
button {
font-size: 16px;
padding: 14px;
}

/* Inputs easier to use */
input, textarea {
font-size: 16px;
}

/* Make page title smaller */
.page-title {
font-size: 22px;
}
}

header {
background: #004687;
color: white;
padding: 50px 20px;
text-align: center;
}

header h1 {
margin: 0;
font-size: 40px;
}

.navbar {
background: #003366;
text-align: center;
padding: 10px 0;
position: relative;
}

.menu-toggle {
display: none;
background: #003366;
color: white;
border: none;
font-size: 18px;
cursor: pointer;
padding: 10px;
width: auto;
min-width: 80px;
}

.nav-links {
display: flex;
justify-content: center;
}

.nav-links a {
color: white;
margin: 0 15px;
text-decoration: none;
font-weight: bold;
}

.nav-links a:hover {
text-decoration: underline;
}

.container {
max-width: 900px;
margin: auto;
padding: 20px;
}

.section {
background: white;
padding: 20px;
border-radius: 10px;
margin-top: 20px;
}

.title {
font-size: 24px;
font-weight: bold;
margin-bottom: 10px;
}

.text {
font-size: 16px;
line-height: 1.5;
color: #333;
}

.contact-box a {
display: block;
margin: 10px 0;
color: #004687;
font-weight: bold;
text-decoration: none;
}

/* FORM STYLING */
input, textarea {
width: 100%;
padding: 10px;
margin-top: 10px;
margin-bottom: 12px;
border-radius: 6px;
border: 1px solid #ccc;
}

button {
background: #004687;
color: white;
border: none;
padding: 12px;
width: 100%;
border-radius: 6px;
cursor: pointer;
font-size: 16px;
}

button:hover {
background: #0066cc;
}
</style>
</head>

<body>

<header>
<h1>Contact Us</h1>
</header>

<!-- NAVBAR -->
<div class="navbar">
<button class="menu-toggle">☰ Menu</button>
<div class="nav-links">
<a href="index.html">Home</a>
<a href="why.html">Why This Matters</a>
<a href="signs.html">Yard Signs</a>
<a href="awareness.html">Raise Awareness</a>
<a href="petition.html">Petition</a>
<a href="contact.html">Contact Us</a>
</div>
</div>

<div class="container">

<div class="section">

<div class="title">Get in Touch</div>

<div class="text">
If you have questions about the campaign or want to get involved, send us a message below.
</div>

<div class="contact-box">

<a href="mailto:youremail@example.com">
📧 youremail@example.com
</a>

<a href="tel:4178609158">
📱 (417)8609158
</a>

</div>

</div>

<!-- CONTACT FORM -->
<div class="section">

<div class="title">Send a Message</div>

<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" rows="6" placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>

</div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
const menuToggle = document.querySelector('.menu-toggle');
const navLinks = document.querySelector('.nav-links');
if (menuToggle && navLinks) {
navLinks.classList.remove('show');
menuToggle.addEventListener('click', function() {
navLinks.classList.toggle('show');
});
const links = navLinks.querySelectorAll('a');
links.forEach(link => {
link.addEventListener('click', function() {
navLinks.classList.remove('show');
});
});
}
});
</script>

</body>
</html>
